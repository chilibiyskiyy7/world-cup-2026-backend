<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121214;
            color: #ffffff;
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, #1c1c1e 0%, #121214 100%);
            border-bottom: 1px solid #2c2c2e;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: #007aff;
        }

        .content-section {
            display: none;
            padding: 20px;
        }

        .content-section.active {
            display: block;
        }

        /* Bottom Tab Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: #1c1c1e;
            border-top: 1px solid #2c2c2e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e8e93;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            flex: 1;
            padding: 10px 0;
        }

        .nav-item.active {
            color: #007aff;
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .clickable-player {
            color: #007aff;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏆 World Cup 2026</h1>
    </div>

    <div id="matches" class="content-section active">
        <h2>📅 Today's Matches</h2>
        <div id="matches-container">
            <p>Loading live matches data...</p>
        </div>
    </div>

    <div id="settings" class="content-section">
        <h2>📊 Group Standings</h2>
        <div id="standings-container">
            <p>Loading tournament tables...</p>
        </div>
    </div>

    <div id="scorers" class="content-section">
        <h2>⚽ Top Scorers</h2>
        <div id="scorers-container">
            <p>Click on a player for details:</p>
            <ul>
                <li><span class="clickable-player" onclick="showPlayer('Lionel Messi', 'Argentina', '3 Goals')">Lionel Messi</span></li>
                <li><span class="clickable-player" onclick="showPlayer('Kylian Mbappé', 'France', '2 Goals')">Kylian Mbappé</span></li>
            </ul>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('matches')">
            <span class="nav-icon">📅</span>
            <span>Matches</span>
        </div>
        <div class="nav-item" onclick="switchTab('settings')">
            <span class="nav-icon">📊</span>
            <span>Standings</span>
        </div>
        <div class="nav-item" onclick="switchTab('scorers')">
            <span class="nav-icon">⚽</span>
            <span>Scorers</span>
        </div>
    </div>

<div id="matches" class="content-section active">
    <h2>📅 Today's Matches</h2>
    <button onclick="loadTodayMatches()">Load Matches</button>
    <div id="matches-container">
        <p>Click the button to load matches.</p>
    </div>
</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function showPlayer(name, country, stats) {
            tg.showPopup({
                title: name,
                message: `Country: ${country}\nStats: ${stats}`,
                buttons: [{type: 'ok'}]
            });
        }

        async function loadTodayMatches() {
    try {
        const response = await fetch("https://world-cup-2026-backend-srlc.onrender.com/"); 
        const data = await response.json();
        const container = document.getElementById("matches-container");
        container.innerHTML = "";

        if (!data.matches || data.matches.length === 0) {
            container.innerHTML = "<p>No matches today.</p>";
            return;
        }

        data.matches.forEach(match => {
            const div = document.createElement("div");
            const date = new Date(match.utcDate);
            div.textContent = `${date.toLocaleString()} — ${match.home} vs ${match.away}`;
            container.appendChild(div);
        });
    } catch (err) {
        console.error("Error loading matches:", err);
        document.getElementById("matches-container").innerHTML = "<p>Error loading matches.</p>";
    }
}
    </script>
</body>
</html>
